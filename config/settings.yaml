"""Configuration settings for the application."""

app:
  name: "Self-Critique Author"
  version: "2.0.0"
  debug: false

# LLM Configuration
llm:
  provider: "gemini"
  model: "gemini-1.5-flash"
  max_retries: 3
  delay_seconds: 5
  api_key: null  # Set via environment variable GEMINI_API_KEY

# Storage Configuration
storage:
  default_format: "json"
  output_directory: "data/processed"
  grievance_directory: "data/processed/grievances"
  message_directory: "data/processed/messages"

# Verification Configuration
verification:
  whatsapp:
    enabled: true
    message_format: "professional"
    max_retry_attempts: 3
    message_expiry_minutes: 1440  # 24 hours
  doctor:
    enabled: true
    email_template: "clinical_verification"
    response_timeout_hours: 48

# Logging Configuration
logging:
  level: "INFO"
  format: "structured"
  file: "logs/app.log"
  console: true

# Pipeline Configuration
pipeline:
  batch_size: 100
  parallel_processing: false
  max_parallel_workers: 4
  timeout_minutes: 30

# Data Validation
validation:
  strict_mode: false
  required_fields:
    - "patient_id"
    - "name"
    - "age"
    - "date_of_birth"
  age_range:
    min: 0
    max: 150
  phone_format: "international"  # "international" or "national"

# Performance Monitoring
monitoring:
  metrics_enabled: true
  performance_tracking: true
  alert_thresholds:
    processing_time_seconds: 300
    error_rate_percent: 5
    memory_usage_mb: 1024
